#:schema https://developers.openai.com/codex/config-schema.json

################################################################################
# UI, and Misc
################################################################################

suppress_unstable_features_warning = true
web_search = "live"
personality = "friendly"

################################################################################
# Core Model Selection
################################################################################

model = "gpt-5.5"
model_reasoning_effort = "high"

################################################################################
# Approval & Sandbox
################################################################################

# Filesystem/network sandbox policy for tool calls:
# - read-only (default)
# - workspace-write
# - danger-full-access (no sandbox; extremely risky)
sandbox_mode = "workspace-write"
approval_policy = "on-failure"

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true

################################################################################
# Notifications
################################################################################

[tui]
notifications = true

################################################################################
# Features
################################################################################

[features]
memories = true

################################################################################
# Agents
################################################################################

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.test-writer]
description = "Write tests when instructed and respect testing guidance of the current project."
config_file = "agents/test-writer.toml"

################################################################################
# Projects (trust levels)
################################################################################

[projects."/Users/segersniels/projects"]
trust_level = "trusted"

[projects."/Users/segersniels/personal"]
trust_level = "trusted"

[projects."/Users/segersniels/.fracture"]
